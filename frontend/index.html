<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="FinQuest - A gamified financial literacy app. Level up your money skills!">
    <title>FinQuest — Level Up Your Finances</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <!-- GSAP for buttery animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ═══════════ BACKGROUND CANVAS (WebGL particles, sparkles) ═══════════ -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <!-- ═══════════ DECORATIONS CANVAS (flowers, butterflies, etc) ═══════════ -->
    <canvas id="deco-canvas" aria-hidden="true"></canvas>

    <!-- ═══════════ HUD BAR ═══════════ -->
    <header class="hud" id="hud-bar">
        <div class="hud__left">
            <div class="hud__logo">
                <div class="hud__logo-coin">
                    <svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z" fill="#FFA000"/></svg>
                </div>
                <span class="hud__logo-text">FinQuest</span>
            </div>
            <button id="reset-progress-btn" style="margin-left: 15px; padding: 6px 14px; font-size: 12px; font-family: 'Fredoka One', cursive; background-color: #FF4B4B; color: white; border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 0 #CC3D3D; transition: all 0.1s ease;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                RESET
            </button>
        </div>
        <div class="hud__stats">
            <div class="hud__stat hud__stat--streak" id="hud-streak">
                <div class="hud__stat-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="#FF6B35"><path d="M12 23c-4.97 0-9-3.58-9-8 0-3.07 2.17-5.83 3.68-7.67l.6-.73c.26-.31.72-.33 1-.04l.38.4c1.4 1.52 3.16 3.45 3.64 5.81.38-.79.76-1.45 1.03-1.88l.42-.67c.2-.31.62-.4.92-.17C16.28 11.39 21 14.79 21 15c0 4.42-4.03 8-9 8z"/></svg>
                </div>
                <span class="hud__stat-val" id="streak-value">3</span>
            </div>
            <div class="hud__stat hud__stat--xp" id="hud-xp">
                <div class="hud__stat-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <span class="hud__stat-val" id="xp-value">250</span>
            </div>
            <div class="hud__stat hud__stat--gems" id="hud-gems">
                <div class="hud__stat-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="#1CB0F6"><path d="M19 3H5L2 9l10 13L22 9l-3-6zM12 17.3L5.8 9h12.4L12 17.3z"/></svg>
                </div>
                <span class="hud__stat-val" id="gems-value">5</span>
            </div>
        </div>
    </header>

    <!-- ═══════════ SCROLLABLE MAP ═══════════ -->
    <main class="map-scroll" id="map-scroll">
        <!-- Stage sections & nodes injected by JS -->
        <div class="map-inner" id="map-inner">
            <!-- Path canvas sits behind nodes, INSIDE map-inner for shared coordinates -->
            <canvas id="path-canvas" aria-hidden="true"></canvas>
        </div>
    </main>

    <!-- ═══════════ LEVEL START MODAL ═══════════ -->
    <div class="modal-overlay" id="level-modal" role="dialog" aria-modal="true">
        <div class="modal-card" id="modal-card">
            <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
            <div class="modal-node" id="modal-node"></div>
            <h2 class="modal-title" id="modal-title">Level 1</h2>
            <p class="modal-desc" id="modal-desc">What is Money?</p>
            <div class="modal-stars" id="modal-stars"></div>
            <button class="btn btn--start" id="modal-start">START</button>
        </div>
    </div>

    <script src="map.js"></script>
</body>
</html>
